name: Build and Release WPF Application

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish (self-contained single file)
      run: dotnet publish TBank_GetUserId.csproj --configuration Release --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TBank_GetUserId
        path: ./publish/TBank_GetUserId.exe

    - name: Release on tag push
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/TBank_GetUserId.exe
        body: |
          Automated release of TBank GetUserId
          - Version: ${{ github.ref_name }}
          - Commit: ${{ github.sha }}
          - Built with .NET 8 (self-contained single file)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
